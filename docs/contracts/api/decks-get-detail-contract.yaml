contract_version: 1
feature: "deck-management"
endpoint:
  method: "GET"
  path: "/api/decks/{deckId}"
  owner: "Backend Developer"

persistence_profile:
  storage_engine: "postgresql"
  persistence_mode: "durable"
  implementation_boundary: "Infrastructure (EF Core DbContext + repositories)"
  contract_notes:
    - "Response schema remains unchanged during storage-provider migration."
    - "Detail endpoint returns the latest committed row state for the requested id."

request:
  path_params:
    - name: "deckId"
      type: "string"
      required: true
  query_params: []
  headers:
    - name: "Authorization"
      type: "string"
      required: true
      format: "Bearer <token>"

responses:
  success:
    status: 200
    schema:
      type: object
      required:
        [
          "id",
          "name",
          "description",
          "createdAtUtc",
          "updatedAtUtc",
          "createdByUserId",
          "updatedByUserId"
        ]
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: ["string", "null"] }
        createdAtUtc: { type: string, format: date-time }
        updatedAtUtc: { type: string, format: date-time }
        createdByUserId: { type: ["string", "null"] }
        updatedByUserId: { type: ["string", "null"] }
    example:
      id: "deck_123"
      name: "Spanish Basics"
      description: "Everyday greetings and introductions"
      createdAtUtc: "2026-03-17T09:00:00Z"
      updatedAtUtc: "2026-03-17T09:45:00Z"
      createdByUserId: "usr_42"
      updatedByUserId: "usr_42"

  errors:
    - status: 401
      code: "unauthorized"
      schema:
        type: object
        required: ["code", "message", "traceId"]
        properties:
          code: { type: string }
          message: { type: string }
          traceId: { type: string }
      example:
        code: "unauthorized"
        message: "Authentication is required"
        traceId: "00-f5723278f44f4745bfeac0f6a4d7b29f-512df251d28744ba-01"

    - status: 403
      code: "forbidden"
      schema:
        type: object
        required: ["code", "message", "traceId"]
        properties:
          code: { type: string }
          message: { type: string }
          traceId: { type: string }
      example:
        code: "forbidden"
        message: "You do not have permission to view this deck"
        traceId: "00-47fb92892006417ba6ff5b2ef99d6d11-f13dbcd6dc454bd8-01"

    - status: 404
      code: "deck_not_found"
      schema:
        type: object
        required: ["code", "message", "traceId"]
        properties:
          code: { type: string }
          message: { type: string }
          traceId: { type: string }
      example:
        code: "deck_not_found"
        message: "Deck not found"
        traceId: "00-c5dafb84de174b75b7f668611fbc4182-f7c8a151346d4f84-01"

    - status: 503
      code: "persistence_unavailable"
      schema:
        type: object
        required: ["code", "message", "traceId"]
        properties:
          code: { type: string }
          message: { type: string }
          traceId: { type: string }
      example:
        code: "persistence_unavailable"
        message: "Persistence service is temporarily unavailable"
        traceId: "00-f1f95950168a46dd88f85691f4bead18-747039b52295c44f-01"

frontend_contract_notes:
  query_key: "decks.detail(deckId)"
  cache_policy: "staleTime=30000, retry=1. Prime from list item for name/description only, then fetch detail on route load."
  route_usage: "routes/decks.$deckId.tsx"

compatibility_rules:
  additive_only: true
  breaking_change_process: "requires ADR update"
