contract_version: 1
feature: "flashcard-authoring-management"
endpoint:
  method: "GET"
  path: "/api/decks/{deckId}/flashcards"
  owner: "Backend Developer"

request:
  path_params:
    - name: "deckId"
      type: "string"
      required: true
  query_params:
    - name: "page"
      type: "integer"
      required: false
      default: 1
      minimum: 1
    - name: "pageSize"
      type: "integer"
      required: false
      default: 50
      minimum: 1
      maximum: 100
  headers:
    - name: "Authorization"
      type: "string"
      required: true
      format: "Bearer <token>"

responses:
  success:
    status: 200
    schema:
      type: object
      required: ["items", "page", "pageSize", "totalCount"]
      properties:
        items:
          type: array
          items:
            type: object
            required:
              [
                "id",
                "deckId",
                "term",
                "definitionPreview",
                "hasImage",
                "updatedAtUtc",
                "updatedByUserId"
              ]
            properties:
              id: { type: string }
              deckId: { type: string }
              term: { type: string }
              definitionPreview: { type: string }
              hasImage: { type: boolean }
              updatedAtUtc: { type: string, format: date-time }
              updatedByUserId: { type: ["string", "null"] }
        page: { type: integer }
        pageSize: { type: integer }
        totalCount: { type: integer }
    example:
      items:
        - id: "fc_8f62f5f6"
          deckId: "deck_123"
          term: "hola"
          definitionPreview: "hello"
          hasImage: true
          updatedAtUtc: "2026-03-15T12:00:00Z"
          updatedByUserId: "usr_42"
        - id: "fc_90b28f34"
          deckId: "deck_123"
          term: "adios"
          definitionPreview: "goodbye"
          hasImage: false
          updatedAtUtc: "2026-03-15T11:52:00Z"
          updatedByUserId: "usr_42"
      page: 1
      pageSize: 50
      totalCount: 2

  errors:
    - status: 400
      code: "validation_error"
      schema:
        type: object
        required: ["code", "message", "errors"]
        properties:
          code: { type: string }
          message: { type: string }
          traceId: { type: string }
          errors:
            type: object
            additionalProperties:
              type: array
              items: { type: string }
      example:
        code: "validation_error"
        message: "Request validation failed"
        traceId: "00-924487f089b54f9a953f0fed00f1819d-57eb8f7357cf2ae4-01"
        errors:
          page: ["page must be greater than or equal to 1"]

    - status: 401
      code: "unauthorized"
      schema:
        type: object
        required: ["code", "message"]
        properties:
          code: { type: string }
          message: { type: string }
          traceId: { type: string }
      example:
        code: "unauthorized"
        message: "Authentication is required"
        traceId: "00-092f0dd3d84b458f9755d3028e019b39-3d4475cee40323f6-01"

    - status: 403
      code: "forbidden"
      schema:
        type: object
        required: ["code", "message"]
        properties:
          code: { type: string }
          message: { type: string }
          traceId: { type: string }
      example:
        code: "forbidden"
        message: "You do not have permission to view this deck"
        traceId: "00-a92028b4b5074fd0a76e75cdcc87cc68-84f4fa4eca0dd85e-01"

    - status: 404
      code: "deck_not_found"
      schema:
        type: object
        required: ["code", "message"]
        properties:
          code: { type: string }
          message: { type: string }
          traceId: { type: string }
      example:
        code: "deck_not_found"
        message: "Deck not found"
        traceId: "00-fd2f5b4b4f4f4dd1a680e05929f24d7f-9f94cd573fa4d60f-01"

frontend_contract_notes:
  query_key: "flashcards.list(deckId, page, pageSize)"
  cache_policy: "staleTime=30000, retry=1. Invalidate on create/update/delete mutations for matching deckId."
  route_usage: "routes/decks.$deckId.flashcards.index.tsx"

compatibility_rules:
  additive_only: true
  breaking_change_process: "requires ADR update"
