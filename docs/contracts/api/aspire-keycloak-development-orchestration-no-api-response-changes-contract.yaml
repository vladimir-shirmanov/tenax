contract_version: 1
feature: "aspire-keycloak-development-orchestration"
change_type: "no_api_response_contract_changes"
endpoint:
  method: "ANY"
  path: "/api/*"
  owner: "Backend Developer"

request:
  path_params: []
  query_params: []
  headers: []

responses:
  success:
    status: 200
    schema:
      type: object
      required: ["contractChange", "justification", "affectedContracts"]
      properties:
        contractChange:
          type: string
          enum: ["none"]
        justification:
          type: string
        affectedContracts:
          type: array
          items:
            type: string
    example:
      contractChange: "none"
      justification: "Development-only Aspire Keycloak orchestration and realm import affect local infrastructure wiring only; endpoint response schemas remain unchanged."
      affectedContracts:
        - "auth-jwt-bearer-discovery-validation-boundary-contract.yaml"
        - "flashcards-create-contract.yaml"
        - "flashcards-list-contract.yaml"
        - "flashcards-get-detail-contract.yaml"
        - "flashcards-update-contract.yaml"
        - "flashcards-delete-contract.yaml"

  errors:
    - status: 409
      code: "contract_violation"
      schema:
        type: object
        required: ["code", "message", "details"]
        properties:
          code: { type: string }
          message: { type: string }
          details:
            type: array
            items: { type: string }
      example:
        code: "contract_violation"
        message: "Detected API response shape drift without contract update"
        details:
          - "Update endpoint contract files before merging implementation"

    - status: 503
      code: "orchestration_unavailable"
      schema:
        type: object
        required: ["code", "message"]
        properties:
          code: { type: string }
          message: { type: string }
      example:
        code: "orchestration_unavailable"
        message: "Local AppHost dependencies are not fully ready; retry after resources become healthy"

frontend_contract_notes:
  query_key: "none"
  cache_policy: "No changes to TanStack Query cache behavior in this scope"
  route_usage: "No frontend route response parser changes required"
  local_dev_alignment:
    - "The imported development realm includes a public tenax-spa client for SPA Authorization Code + PKCE login."
    - "The dev SPA client allows loopback-only wildcard local port patterns for both http://127.0.0.1 and http://localhost as redirect/web origins."
    - "AppHost-projected VITE_TENAX_AUTH_* defaults must stay aligned with the imported realm's authority, audience, client id, and redirect-origin settings."

compatibility_rules:
  additive_only: true
  breaking_change_process: "requires ADR update"
  no_change_guardrails:
    - "This scope does not introduce or modify HTTP endpoint request/response payload schemas"
    - "Existing endpoint contracts remain the only source of truth for API behavior"
    - "Any auth or flashcard endpoint response shape change requires explicit contract update and ADR amendment"
