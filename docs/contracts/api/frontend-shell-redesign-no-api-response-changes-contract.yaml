contract_version: 1
feature: "frontend-shell-redesign"
change_type: "no_api_response_contract_changes"
endpoint:
  method: "ANY"
  path: "/api/*"
  owner: "Backend Developer"

request:
  path_params: []
  query_params: []
  headers: []

responses:
  success:
    status: 200
    schema:
      type: object
      required: ["contractChange", "justification", "affectedContracts"]
      properties:
        contractChange:
          type: string
          enum: ["none"]
        justification:
          type: string
        affectedContracts:
          type: array
          items:
            type: string
    example:
      contractChange: "none"
      justification: "The frontend shell redesign and theme architecture change SPA layout, design tokens, and client-only theme preference behavior only; backend HTTP response shapes and endpoint inventory remain unchanged."
      affectedContracts:
        - "auth-jwt-bearer-discovery-validation-boundary-contract.yaml"
        - "flashcards-create-contract.yaml"
        - "flashcards-list-contract.yaml"
        - "flashcards-get-detail-contract.yaml"
        - "flashcards-update-contract.yaml"
        - "flashcards-delete-contract.yaml"

  errors:
    - status: 409
      code: "contract_violation"
      schema:
        type: object
        required: ["code", "message", "details"]
        properties:
          code: { type: string }
          message: { type: string }
          details:
            type: array
            items: { type: string }
      example:
        code: "contract_violation"
        message: "Detected API response shape drift without contract update during frontend redesign delivery"
        details:
          - "Do not change backend response payloads as part of shell or theme work"
          - "Do not introduce redesign-specific backend endpoints"
          - "Update endpoint-specific contracts and ADRs before any API behavior change"

    - status: 503
      code: "delivery_scope_violation"
      schema:
        type: object
        required: ["code", "message"]
        properties:
          code: { type: string }
          message: { type: string }
      example:
        code: "delivery_scope_violation"
        message: "Frontend redesign delivery attempted to expand into backend/API scope without approved architecture update"

frontend_contract_notes:
  query_key: "existing keys only; redesign must preserve auth.session and flashcard query/mutation behavior"
  cache_policy: "No TanStack Query contract changes; keep current fetch, invalidation, loading, error, and recovery semantics while visual treatment changes"
  route_usage: "Home route, decks route, and flashcard authoring/detail routes rendered inside a redesigned root shell"
  theming_rules:
    - "Theme preference is client-only and must not require a backend read/write endpoint"
    - "Header-owned theme controls must not alter auth/session or flashcard API behavior"
    - "Route migration may restyle API states but must not reinterpret success or error payload shapes"

compatibility_rules:
  additive_only: true
  breaking_change_process: "requires ADR update"
  no_change_guardrails:
    - "This scope does not introduce or modify backend HTTP request/response payload schemas"
    - "Existing auth and flashcard contracts remain authoritative during redesign rollout"
    - "Any future theme-preference API or profile persistence endpoint requires a separate ADR and dedicated contract"