contract_version: 1
feature: "deck-management"
endpoint:
  method: "GET"
  path: "/api/decks"
  owner: "Backend Developer"

persistence_profile:
  storage_engine: "postgresql"
  persistence_mode: "durable"
  implementation_boundary: "Infrastructure (EF Core DbContext + repositories)"
  contract_notes:
    - "Response schema remains unchanged during storage-provider migration."
    - "List returns only decks owned by the authenticated user."

request:
  path_params: []
  query_params:
    - name: "page"
      type: "integer"
      required: false
      default: 1
      minimum: 1
    - name: "pageSize"
      type: "integer"
      required: false
      default: 20
      minimum: 1
      maximum: 100
  headers:
    - name: "Authorization"
      type: "string"
      required: true
      format: "Bearer <token>"

responses:
  success:
    status: 200
    behavioral_guarantees:
      - "Ordering is deterministic by updatedAtUtc descending, then id descending."
      - "totalCount reflects committed rows for the authenticated owner scope."
    schema:
      type: object
      required: ["items", "page", "pageSize", "totalCount"]
      properties:
        items:
          type: array
          items:
            type: object
            required:
              [
                "id",
                "name",
                "description",
                "flashcardCount",
                "createdAtUtc",
                "updatedAtUtc",
                "createdByUserId",
                "updatedByUserId"
              ]
            properties:
              id: { type: string }
              name: { type: string }
              description: { type: ["string", "null"] }
              flashcardCount: { type: integer }
              createdAtUtc: { type: string, format: date-time }
              updatedAtUtc: { type: string, format: date-time }
              createdByUserId: { type: ["string", "null"] }
              updatedByUserId: { type: ["string", "null"] }
        page: { type: integer }
        pageSize: { type: integer }
        totalCount: { type: integer }
    example:
      items:
        - id: "deck_123"
          name: "Spanish Basics"
          description: "Everyday greetings and introductions"
          flashcardCount: 42
          createdAtUtc: "2026-03-17T09:00:00Z"
          updatedAtUtc: "2026-03-17T09:45:00Z"
          createdByUserId: "usr_42"
          updatedByUserId: "usr_42"
        - id: "deck_124"
          name: "Travel Phrases"
          description: null
          flashcardCount: 12
          createdAtUtc: "2026-03-16T16:00:00Z"
          updatedAtUtc: "2026-03-16T16:10:00Z"
          createdByUserId: "usr_42"
          updatedByUserId: "usr_42"
      page: 1
      pageSize: 20
      totalCount: 2

  errors:
    - status: 400
      code: "validation_error"
      schema:
        type: object
        required: ["code", "message", "traceId", "errors"]
        properties:
          code: { type: string }
          message: { type: string }
          traceId: { type: string }
          errors:
            type: object
            additionalProperties:
              type: array
              items: { type: string }
      example:
        code: "validation_error"
        message: "Request validation failed"
        traceId: "00-97a2f89e0a8f4cf0b7f56bf278f16f65-2f21957fdf4ebefa-01"
        errors:
          pageSize: ["pageSize must be between 1 and 100"]

    - status: 401
      code: "unauthorized"
      schema:
        type: object
        required: ["code", "message", "traceId"]
        properties:
          code: { type: string }
          message: { type: string }
          traceId: { type: string }
      example:
        code: "unauthorized"
        message: "Authentication is required"
        traceId: "00-34011d1c78c84ef89f2e7f14e370e657-6f36456c68d12eb5-01"

    - status: 503
      code: "persistence_unavailable"
      schema:
        type: object
        required: ["code", "message", "traceId"]
        properties:
          code: { type: string }
          message: { type: string }
          traceId: { type: string }
      example:
        code: "persistence_unavailable"
        message: "Persistence service is temporarily unavailable"
        traceId: "00-417bc090f6c249d78595e7f4b31f3f95-9be6c5bb96c20712-01"

frontend_contract_notes:
  query_key: "decks.list(page, pageSize)"
  cache_policy: "staleTime=30000, retry=1. Invalidate on create/update/delete deck mutations. Preserve previous page data while fetching next page."
  route_usage: "routes/decks.tsx"

compatibility_rules:
  additive_only: true
  breaking_change_process: "requires ADR update"
