contract_version: 2
feature: "homepage-auth-session"
contract_status: "superseded"
superseded_by:
  - "docs/adr/0006-frontend-pkce-backend-jwt-bearer-boundary.md"
endpoint:
  method: "POST"
  path: "/api/auth/oidc/login/start"
  owner: "Architecture"

request:
  path_params: []
  query_params: []
  headers: []

responses:
  success:
    status: 404
    behavioral_guarantees:
      - "This endpoint is out of scope and MUST NOT be implemented by backend in current scope."
      - "Frontend initiates Authorization Code + PKCE directly via OIDC client integration."
    schema:
      type: object
      required: ["code", "message"]
      properties:
        code: { type: string }
        message: { type: string }
    example:
      code: "not_found"
      message: "Endpoint not found"

  errors:
    - status: 409
      code: "contract_violation"
      schema:
        type: object
        required: ["code", "message", "details"]
        properties:
          code: { type: string }
          message: { type: string }
          details:
            type: array
            items: { type: string }
      example:
        code: "contract_violation"
        message: "Attempted implementation of superseded backend login-start endpoint"
        details:
          - "Use frontend OIDC client for PKCE login initiation"

frontend_contract_notes:
  query_key: "none"
  cache_policy: "Frontend OIDC client owns login initiation and browser redirect handling."
  route_usage: "Homepage login action"

compatibility_rules:
  additive_only: true
  breaking_change_process: "requires ADR update"
  supersession_rules:
    - "Any reintroduction of this endpoint requires a new ADR and a new endpoint contract"

