contract_version: 2
feature: "homepage-auth-session"
contract_status: "superseded"
superseded_by:
  - "docs/adr/0006-frontend-pkce-backend-jwt-bearer-boundary.md"
  - "docs/contracts/api/auth-jwt-bearer-discovery-validation-boundary-contract.yaml"
endpoint:
  method: "GET"
  path: "/api/auth/session"
  owner: "Architecture"

request:
  path_params: []
  query_params: []
  headers: []

responses:
  success:
    status: 404
    behavioral_guarantees:
      - "This endpoint is out of scope and MUST NOT be implemented in the current delivery scope."
      - "Homepage authentication gating is frontend-owned via standards-based OIDC client state."
    schema:
      type: object
      required: ["code", "message"]
      properties:
        code: { type: string }
        message: { type: string }
    example:
      code: "not_found"
      message: "Endpoint not found"

  errors:
    - status: 409
      code: "contract_violation"
      schema:
        type: object
        required: ["code", "message", "details"]
        properties:
          code: { type: string }
          message: { type: string }
          details:
            type: array
            items: { type: string }
      example:
        code: "contract_violation"
        message: "Attempted implementation of superseded auth-session endpoint"
        details:
          - "See ADR 0006 for current authentication boundary"

frontend_contract_notes:
  query_key: "auth.session (frontend-local only, not backend API)"
  cache_policy: "Frontend determines auth-gated menu state using OIDC client session/token state and protected API outcomes."
  route_usage: "Homepage menu visibility state"

compatibility_rules:
  additive_only: true
  breaking_change_process: "requires ADR update"
  supersession_rules:
    - "Any reintroduction of this endpoint requires a new ADR and a new v1+ contract before implementation"

