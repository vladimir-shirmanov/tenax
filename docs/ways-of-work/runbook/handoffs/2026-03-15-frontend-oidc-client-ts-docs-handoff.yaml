  - "docs/ways-of-work/runbook/handoffs/2026-03-15-frontend-oidc-client-ts-docs-handoff.yaml"
  - "docs/ways-of-work/runbook/handoffs/2026-03-15-frontend-oidc-client-ts-issue-tasks.yaml"
test_evidence:
  targeted:
    - command: "docs-only source review of src/Tenax.Web/frontend/src/api/auth.ts, src/Tenax.Web/frontend/package.json, and src/Tenax.Web/frontend/src/routes/home.route.test.tsx"
      outcome: "Completed; docs updated to match implemented oidc-client-ts behavior and current route-test assertions."
