  - "Documentation matches current auth.ts behavior for login start, callback processing, logout, and session query semantics."
  - "Documentation reflects route-test evidence for redirect start, callback success/failure, and logout back to anonymous UI."
  - "Runbook guidance no longer references the removed custom PKCE transaction key."
files_changed:
  - "docs/adr/0008-frontend-oidc-client-ts-auth-flow.md"
  - "docs/contracts/api/frontend-oidc-client-ts-auth-session-interaction-contract.yaml"
